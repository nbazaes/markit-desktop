name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-sidecar:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            sidecar-name: markit-convert-x86_64-unknown-linux-gnu
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            sidecar-name: markit-convert-x86_64-pc-windows-msvc.exe
          - platform: macos-latest
            target: aarch64-apple-darwin
            sidecar-name: markit-convert-aarch64-apple-darwin

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install sidecar dependencies
        run: |
          cd python-sidecar
          pip install -r requirements.txt

      - name: Build sidecar (Linux/macOS)
        if: matrix.platform != 'windows-latest'
        run: |
          cd python-sidecar
          pyinstaller convert.spec --clean
          mkdir -p ../src-tauri/sidecars
          cp dist/markit-convert ../src-tauri/sidecars/${{ matrix.sidecar-name }}
          chmod +x ../src-tauri/sidecars/${{ matrix.sidecar-name }}

      - name: Build sidecar (Windows)
        if: matrix.platform == 'windows-latest'
        run: |
          cd python-sidecar
          pyinstaller convert.spec --clean
          New-Item -ItemType Directory -Force -Path ../src-tauri/sidecars
          Copy-Item dist/markit-convert.exe ../src-tauri/sidecars/${{ matrix.sidecar-name }}

      - name: Upload sidecar artifact
        uses: actions/upload-artifact@v4
        with:
          name: sidecar-${{ matrix.target }}
          path: src-tauri/sidecars/${{ matrix.sidecar-name }}

  build-tauri:
    needs: build-sidecar
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            args: ''
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            args: ''
          - platform: macos-latest
            target: aarch64-apple-darwin
            args: '--target aarch64-apple-darwin'

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget libssl-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Download sidecar (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        uses: actions/download-artifact@v4
        with:
          name: sidecar-x86_64-unknown-linux-gnu
          path: src-tauri/sidecars/

      - name: Download sidecar (Windows)
        if: matrix.platform == 'windows-latest'
        uses: actions/download-artifact@v4
        with:
          name: sidecar-x86_64-pc-windows-msvc
          path: src-tauri/sidecars/

      - name: Download sidecar (macOS)
        if: matrix.platform == 'macos-latest'
        uses: actions/download-artifact@v4
        with:
          name: sidecar-aarch64-apple-darwin
          path: src-tauri/sidecars/

      - name: Make sidecar executable (Linux/macOS)
        if: matrix.platform != 'windows-latest'
        run: chmod +x src-tauri/sidecars/*

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'MarkIt-Desktop v__VERSION__'
          releaseBody: 'See the assets to download and install this version.'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
